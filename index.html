  <body>
    <style>
      /* ===================== ROOT DESIGN TOKENS ===================== */
      :root {
        --gba-purple:      #311047;
        --gba-purple-dark: #1a0828;
        --gba-purple-mid:  #4a1a6e;
        --gba-pink:        #ff65a3;
        --gba-pink-dark:   #c4166a;
        --gba-gold:        #ffd700;
        --gba-gold-dark:   #b8860b;
        --gba-green:       #38d468;
        --gba-green-dark:  #1a8a3c;
        --gba-red:         #e83030;
        --gba-red-dark:    #a01010;
        --gba-grey:        #9ba5b4;
        --gba-grey-dark:   #6b7280;
        --gba-white:       #f0e8ff;
        --gba-screen:      #8bac0f;
        --dialogue-bg:     rgba(12, 4, 28, 0.97);
        --dialogue-border: #ffd700;
        --dialogue-text:   #f0e8ff;
        --hud-height:      0px;
        --ctrl-size-dpad:  clamp(100px, 20vw, 140px);
        --ctrl-size-ab:    clamp(90px, 18vw, 130px);
        --font-pixel:      'Press Start 2P', monospace;
        --font-vt:         'VT323', 'monogram', monospace;
      }

      /* ===================== RESET & BASE ===================== */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      @font-face {
        font-family: monogram;
        src: url(/birthdaytest1/monogram.ttf);
        font-display: swap;
      }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: var(--gba-purple-dark);
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: var(--font-vt);
        font-size: clamp(1.2rem, 2.5vw, 2rem);
        color: var(--gba-white);
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ===================== APP CONTAINER ===================== */
      #app {
        width: 100%; height: 100%;
        position: relative;
        overflow: hidden;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ===================== BIRTHDAY HUD ===================== */
      #birthday-hud {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: var(--hud-height);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        background: linear-gradient(180deg, rgba(12,4,28,0.92) 0%, transparent 100%);
        pointer-events: none;
      }

      /* ===================== SCENE TRANSITION ===================== */
      #scene-fade {
        position: absolute;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 200;
        transition: opacity 0.4s ease;
      }
      #scene-fade.fade-in  { opacity: 1; pointer-events: all; }
      #scene-fade.fade-out { opacity: 0; }

      /* ===================== DIALOGUE BOX ===================== */
      #textbox-container {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        display: none;
        z-index: 100;
        padding: 0 clamp(8px, 4vw, 48px) clamp(8px, 3vh, 24px);
        animation: dialogueSlideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      body.touch-device #textbox-container {
        bottom: calc(var(--ctrl-size-dpad) + 28px);
        padding: 0 8px 8px;
      }

      @keyframes dialogueSlideUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }

      #textbox {
        background: var(--dialogue-bg);
        border: 3px solid var(--dialogue-border);
        border-radius: 6px;
        padding: clamp(10px, 2vw, 20px) clamp(12px, 3vw, 28px);
        box-shadow:
          0 0 0 1px rgba(255,215,0,0.2),
          0 0 24px rgba(255,215,0,0.15),
          inset 0 1px 0 rgba(255,255,255,0.05);
        position: relative;
        min-height: clamp(80px, 16vh, 130px);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* Corner decorations */
      #textbox::before, #textbox::after {
        content: '♦';
        position: absolute;
        color: var(--gba-gold);
        font-size: 0.7rem;
        opacity: 0.8;
      }
      #textbox::before { top: 6px; left: 8px; }
      #textbox::after  { top: 6px; right: 8px; }

      #dialogue-speaker {
        font-family: var(--font-pixel);
        font-size: clamp(0.5rem, 1.2vw, 0.65rem);
        color: var(--gba-gold);
        text-shadow: 0 0 8px rgba(255,215,0,0.6);
        display: none;
        letter-spacing: 0.05em;
      }

      #dialogue {
        font-family: var(--font-vt);
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        color: var(--dialogue-text);
        line-height: 1.5;
        flex: 1;
        min-height: 2.5em;
        word-break: break-word;
      }

      /* Blinking cursor after text */
      #dialogue-cursor {
        display: inline-block;
        width: 10px; height: 1.1em;
        background: var(--gba-gold);
        margin-left: 3px;
        vertical-align: bottom;
        animation: cursorBlink 0.7s step-start infinite;
        opacity: 0;
      }
      #dialogue-cursor.visible { opacity: 1; }

      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Dialogue bottom row */
      .dialogue-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      .dialogue-page-indicator {
        font-family: var(--font-pixel);
        font-size: 0.45rem;
        color: var(--gba-grey);
        letter-spacing: 0.05em;
      }

      .dialogue-btn-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* ▼ next page chevron */
      #dialogue-next {
        display: none;
        width: 18px; height: 18px;
        border-right: 3px solid var(--gba-gold);
        border-bottom: 3px solid var(--gba-gold);
        transform: rotate(45deg);
        animation: bounceDown 0.7s ease-in-out infinite;
        cursor: pointer;
        align-self: flex-end;
        margin-right: 4px;
        flex-shrink: 0;
      }
      #dialogue-next.visible { display: block; }

      @keyframes bounceDown {
        0%, 100% { transform: rotate(45deg) translateY(0); }
        50%       { transform: rotate(45deg) translateY(4px); }
      }

      .ui-text { margin: 0; }

      .ui-close-btn {
        font-family: var(--font-pixel);
        font-size: clamp(0.45rem, 1.3vw, 0.6rem);
        background: rgba(255,215,0,0.12);
        color: var(--gba-gold);
        border: 2px solid var(--gba-gold-dark);
        border-radius: 4px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      .ui-close-btn:hover {
        background: rgba(255,215,0,0.22);
        box-shadow: 0 0 8px rgba(255,215,0,0.3);
      }
      .ui-close-btn:active { transform: scale(0.95); }

      .ui-heart-btn {
        font-family: var(--font-pixel);
        font-size: clamp(0.45rem, 1.3vw, 0.6rem);
        background: linear-gradient(135deg, #ff3366, #c4166a);
        color: white;
        border: 2px solid #ff3366;
        border-radius: 4px;
        padding: 6px 14px;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(255,51,102,0.4);
        transition: box-shadow 0.2s, transform 0.1s;
        display: none;
        white-space: nowrap;
        animation: heartPulse 1.5s ease-in-out infinite;
        letter-spacing: 0.05em;
      }
      .ui-heart-btn:hover { box-shadow: 0 6px 20px rgba(255,51,102,0.6); }
      .ui-heart-btn:active { transform: scale(0.95); }

      @keyframes heartPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }

      /* ===================== NOTE / CONTROLS HINT (Desktop) ===================== */
      .note {
        position: absolute;
        left: 12px; top: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        color: rgba(240,232,255,0.65);
        z-index: 10;
        pointer-events: none;
        font-family: var(--font-pixel);
        font-size: clamp(0.35rem, 0.9vw, 0.48rem);
        line-height: 1.6;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      }
      .note span { display: block; }
      body.touch-device .note { display: none; }

      /* ===================== INTERACTION HINT ===================== */
      .interaction-hint {
        position: absolute;
        bottom: 110%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(12,4,28,0.92);
        border: 2px solid var(--gba-pink);
        border-radius: 4px;
        padding: 3px 8px;
        font-family: var(--font-pixel);
        font-size: 0.4rem;
        color: var(--gba-pink);
        white-space: nowrap;
        pointer-events: none;
        animation: hintBob 1s ease-in-out infinite;
        z-index: 30;
        display: none;
      }
      .interaction-hint.visible { display: block; }

      @keyframes hintBob {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50%       { transform: translateX(-50%) translateY(-4px); }
      }

      /* ===================== PARTICLE CONTAINER ===================== */
      #particle-container {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 60;
      }

      .particle {
        position: absolute;
        pointer-events: none;
        font-size: 1.2rem;
        animation: particleFly 2s ease-out forwards;
      }

      @keyframes particleFly {
        0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
        100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--rot)); }
      }

      /* Confetti pieces */
      .confetti-piece {
        position: absolute;
        width: 8px; height: 8px;
        pointer-events: none;
        animation: confettiFall var(--dur, 3s) ease-in forwards;
        border-radius: var(--br, 0);
        background: var(--col, #ffd700);
        opacity: 0.9;
      }

      @keyframes confettiFall {
        0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(110vh) rotate(var(--spin, 720deg)); opacity: 0; }
      }

      /* ===================== MOBILE GBA CONTROLLER ===================== */
      .mobile-controls {
        display: none;
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 90;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      body.touch-device .mobile-controls { display: block; }

      /* ---- D-PAD ---- */
      .dpad-container {
        position: absolute;
        bottom: clamp(14px, 4vh, 32px);
        left: clamp(12px, 3vw, 28px);
        width: var(--ctrl-size-dpad);
        height: var(--ctrl-size-dpad);
        pointer-events: auto;
        touch-action: none;
      }

      /* Cross/plus shape via CSS grid */
      .dpad-grid {
        display: grid;
        grid-template-columns: 1fr 1.6fr 1fr;
        grid-template-rows: 1fr 1.6fr 1fr;
        width: 100%; height: 100%;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
      }

      .dpad-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #3a2550, #27193a);
        border: 1.5px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.7);
        font-size: clamp(0.7rem, 2vw, 1.1rem);
        transition: background 0.08s, transform 0.06s;
        touch-action: none;
        cursor: pointer;
        /* pixel-art flat feel */
        image-rendering: pixelated;
      }

      .dpad-up    { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; }
      .dpad-left  { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; }
      .dpad-center{ grid-column: 2; grid-row: 2; background: #1e1230; border-color: rgba(255,255,255,0.08); pointer-events: none; }
      .dpad-right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; }
      .dpad-down  { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; }

      .dpad-btn.active,
      .dpad-btn:active {
        background: linear-gradient(145deg, #6b3fa0, #4a2770);
        border-color: rgba(255,255,255,0.4);
        color: #fff;
        transform: scale(0.91);
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
      }

      /* ---- GBA START/SELECT ---- */
      .gba-center-btns {
        position: absolute;
        bottom: clamp(14px, 3vh, 24px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: clamp(10px, 2vw, 18px);
        pointer-events: auto;
        touch-action: none;
      }

      .center-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        touch-action: none;
      }

      .center-btn-pill {
        width: clamp(38px, 8vw, 54px);
        height: clamp(12px, 2.5vh, 18px);
        background: linear-gradient(145deg, #3a2550, #27193a);
        border: 1.5px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(-10deg);
        transition: background 0.08s, transform 0.06s;
        cursor: pointer;
      }

      .center-btn-pill:active,
      .center-btn-pill.active {
        background: linear-gradient(145deg, #6b3fa0, #4a2770);
        transform: rotate(-10deg) scale(0.9);
      }

      .center-btn-label {
        font-family: var(--font-pixel);
        font-size: clamp(0.28rem, 0.8vw, 0.38rem);
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        transform: rotate(0deg);
      }

      /* ---- ACTION BUTTONS (A/B) ---- */
      .action-container {
        position: absolute;
        bottom: clamp(14px, 4vh, 32px);
        right: clamp(12px, 3vw, 28px);
        width: var(--ctrl-size-ab);
        height: calc(var(--ctrl-size-ab) * 0.7);
        pointer-events: auto;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 2vw, 14px);
        transform: rotate(-12deg);
        transform-origin: center;
      }

      .action-btn-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        touch-action: none;
      }

      .action-btn {
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-pixel);
        font-weight: bold;
        color: white;
        border: 2.5px solid;
        cursor: pointer;
        transition: transform 0.07s, box-shadow 0.07s, filter 0.07s;
        touch-action: none;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        box-shadow: 0 5px 0 rgba(0,0,0,0.4), 0 6px 14px rgba(0,0,0,0.3);
        -webkit-tap-highlight-color: transparent;
      }

      .action-btn:active,
      .action-btn.active {
        transform: translateY(3px) scale(0.93);
        box-shadow: 0 2px 0 rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.3);
        filter: brightness(1.3);
      }

      .btn-b {
        width: clamp(34px, 8vw, 46px);
        height: clamp(34px, 8vw, 46px);
        background: radial-gradient(circle at 35% 35%, #f04040, var(--gba-red-dark));
        border-color: var(--gba-red);
        font-size: clamp(0.55rem, 1.8vw, 0.75rem);
        box-shadow: 0 5px 0 #6b0000, 0 6px 14px rgba(232,48,48,0.3);
      }
      .btn-b:active, .btn-b.active {
        box-shadow: 0 2px 0 #6b0000, 0 3px 8px rgba(232,48,48,0.3);
      }

      .btn-a {
        width: clamp(42px, 10vw, 56px);
        height: clamp(42px, 10vw, 56px);
        background: radial-gradient(circle at 35% 35%, #50e080, var(--gba-green-dark));
        border-color: var(--gba-green);
        font-size: clamp(0.6rem, 2vw, 0.82rem);
        box-shadow: 0 5px 0 #0d4f20, 0 6px 14px rgba(56,212,104,0.3);
        margin-top: clamp(-10px, -2vh, -14px);
      }
      .btn-a:active, .btn-a.active {
        box-shadow: 0 2px 0 #0d4f20, 0 3px 8px rgba(56,212,104,0.3);
      }

      .btn-label {
        font-family: var(--font-pixel);
        font-size: clamp(0.28rem, 0.8vw, 0.38rem);
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.04em;
        pointer-events: none;
        user-select: none;
      }

      /* ===================== ORIENTATION LOCK MODAL ===================== */
      #orientation-modal {
        position: fixed;
        inset: 0;
        background: var(--gba-purple-dark);
        z-index: 9999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 4vh, 32px);
        padding: 24px;
        text-align: center;
      }

      #orientation-modal.visible { display: flex; }

      .orientation-icon {
        font-size: clamp(3rem, 12vw, 5rem);
        animation: rotatePhone 2s ease-in-out infinite;
        display: block;
      }

      @keyframes rotatePhone {
        0%   { transform: rotate(0deg);  }
        20%  { transform: rotate(0deg);  }
        50%  { transform: rotate(90deg); }
        80%  { transform: rotate(90deg); }
        100% { transform: rotate(0deg);  }
      }

      .orientation-title {
        font-family: var(--font-pixel);
        font-size: clamp(0.55rem, 2.5vw, 0.85rem);
        color: var(--gba-gold);
        line-height: 1.8;
        text-shadow: 0 0 12px rgba(255,215,0,0.4);
        max-width: 280px;
      }

      .orientation-sub {
        font-family: var(--font-vt);
        font-size: clamp(1rem, 4vw, 1.4rem);
        color: var(--gba-grey);
        max-width: 260px;
        line-height: 1.5;
      }

      /* Pixel border decorations */
      .pixel-border {
        width: clamp(120px, 40vw, 200px);
        height: 4px;
        background: repeating-linear-gradient(
          90deg,
          var(--gba-gold) 0, var(--gba-gold) 8px,
          transparent 8px, transparent 16px
        );
        opacity: 0.4;
      }

      /* ===================== CANVAS OVERRIDE ===================== */
      #game {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ===================== RESPONSIVE OVERRIDES ===================== */
      @media (max-height: 400px) and (orientation: landscape) {
        :root {
          --ctrl-size-dpad: 90px;
          --ctrl-size-ab:   80px;
        }
        .dpad-container { bottom: 8px; left: 8px; }
        .action-container { bottom: 8px; right: 8px; }
        .gba-center-btns { bottom: 6px; }
        #textbox-container { bottom: calc(var(--ctrl-size-dpad) + 12px); }
      }

      @media (max-width: 360px) {
        :root {
          --ctrl-size-dpad: 88px;
          --ctrl-size-ab:   76px;
        }
      }

      /* ===================== PREFERS REDUCED MOTION ===================== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

    <!-- ==================== ORIENTATION LOCK ==================== -->
    <div id="orientation-modal" role="dialog" aria-modal="true" aria-label="Please rotate your device">
      <div class="pixel-border"></div>
      <span class="orientation-icon" aria-hidden="true">📱</span>
      <p class="orientation-title">ROTATE YOUR DEVICE</p>
      <p class="orientation-sub">Please rotate your device sideways to continue the adventure!</p>
      <div class="pixel-border"></div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="app">

      <!-- Scene Fade Overlay -->
      <div id="scene-fade" aria-hidden="true"></div>

      <!-- Particle Container -->
      <div id="particle-container" aria-hidden="true"></div>

      <!-- Desktop Controls Hint -->
      <div class="note" aria-label="Keyboard controls">
        <span>WASD / ↑↓←→ MOVE</span>
        <span>ENTER / SPACE — A (Interact)</span>
        <span>ESC / BKSP — B (Close)</span>
      </div>

      <!-- Dialogue Box -->
      <div id="textbox-container" role="dialog" aria-live="polite" aria-label="Game dialogue">
        <div id="textbox">
          <div id="dialogue-speaker" aria-hidden="true"></div>
          <div id="dialogue-body">
            <p id="dialogue" class="ui-text" aria-live="assertive"></p>
            <span id="dialogue-cursor" aria-hidden="true"></span>
          </div>
          <div class="dialogue-footer">
            <span class="dialogue-page-indicator" id="page-indicator" aria-label="Page indicator"></span>
            <div class="dialogue-btn-row">
              <div id="dialogue-next" aria-hidden="true" title="Next page"></div>
              <button id="heart-btn" class="ui-heart-btn" aria-label="Go outside">💖 Let's Go!</button>
              <button id="close" class="ui-close-btn" aria-label="Close dialogue">Close ▶</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Game Canvas -->
      <canvas id="game" aria-label="Birthday adventure game"></canvas>

    </div>


    <!-- ==================== ORIENTATION DETECTION ==================== -->
    <script>
      (function () {
        const modal    = document.getElementById('orientation-modal');
        // Only activate on genuine touch/mobile devices — not desktops with touch screens
        const isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0) &&
                         !window.matchMedia('(pointer: fine)').matches;

        if (!isMobile) return; // Desktop: never show modal

        function checkOrientation() {
          const isPortrait = window.matchMedia('(orientation: portrait)').matches;
          if (isPortrait) {
            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';
          } else {
            modal.classList.remove('visible');
            document.body.style.overflow = '';
          }
        }

        checkOrientation();

        // Modern API
        if (screen.orientation) {
          screen.orientation.addEventListener('change', checkOrientation);
        }
        // Fallback
        window.addEventListener('orientationchange', checkOrientation);
        window.addEventListener('resize', checkOrientation);
      })();
    </script>
  </body>
</html>
